<!DOCTYPE html>
<html>
<head>
  <title>Cast Your Vote</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header>
    <h1>Cast Your Vote</h1>
  </header>
  <div class="page-container">
    <section class="panel vote-panel">
      <p class="notice">Your biometric identity has been verified against the ID you provided. Please select a candidate to vote.</p>
      <div class="vote-section">
        <form method="POST" class="candidate-form">
      {% for candidate in candidates %}
        <div class="candidate-card {{ candidate.party|lower }}">
          <img src="{{ url_for('static', filename='images/' + candidate.image) }}" alt="{{ candidate.name }}">
          <h3>{{ candidate.name }}</h3>
          <p>{{ candidate.party }}</p>
          <label>
            <input type="radio" name="candidate_id" value="{{ candidate.id }}" required>
            Select
          </label>
          <button type="submit" class="btn vote-btn">Vote</button>
        </div>
      {% endfor %}
        </form>

        <div class="chart-container">
          <h3>Live Vote Count</h3>
          <canvas id="voteChart"></canvas>
          <button type="button" class="btn secondary" onclick="loadChart()">Refresh Chart</button>
        </div>
      </div>
    </section>
  </div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
